body:
  text: 卷四第六十一證驚惕歌傷寒何故生驚惕吐下溫針或火力或因吐下或因溫針或因火劫下之譫語牡蠣湯仲景云傷寒八九日下之胸滿煩驚小便不利譫語一身盡痛不可轉側者柴胡牡蠣龍骨湯主之妄用溫針於理逆仲景云太陽傷寒加溫針必驚也風溫被火多痸尺世切亦作瘛瘲瘲子用切仲景云風溫被火者微發黃色劇則如驚癇時痸瘲若火熏之一逆尚引日再逆促命期陽明被火汗流出仲景云陽明病被火額上微汗出發熱汗出不惡寒加溫針者必怵惕煩躁不得眠脈浮火劫必亡陽仲景云傷寒脈浮醫以火迫劫之亡陽必驚狂臥起不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯三者不同同此疾少陽中風耳無聞吐下悸驚常惕惕仲景云少陽中風兩耳無所聞目赤胸中滿而不煩不可吐下吐下則悸而驚第六十二證心悸歌傷寒心悸有多端大抵三陽不一般仲景云悸證有八九皆屬三陽太陽便利多飲水仲景云太陽病小便利者以飲水多心下悸小便少者必苦裡急也陽明煩嘔小便難仲景云傷寒五六日中風往來多熱心下悸小便不利心煩喜嘔者小柴胡湯主之少陽吐下仍虛悸仲景云少陽中風兩耳無所聞目赤胃中滿而煩不可吐下吐下則悸而驚誤下煩時胃內干仲景云傷寒其脈弦細脅痛發熱此屬少陽少陽不可發汗發汗則譫語為屬胃胃和則愈胃不和則煩而悸也脈來結代炙甘草仲景云傷寒脈結代心動悸炙甘草湯主之方第三十九小建中行三日間仲景云傷寒二三日心中悸者小建中湯汗過自冒桂甘證肉瞤真武定須安此二證自汗過而悸也仲景云發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯方第二十七又云太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之方第四十二第六十三證冒悶歌二陽並病必須冒宜刺大椎當慎表仲景云太陽少陽並病頭痛或眩冒時如結胸痞硬當刺大椎第一間肺俞肝俞慎不可發汗下利面赤脈沉遲汗出中心常郁懊仲景云下利脈沉遲其人面少赤身有微熱下利清穀者必鬱冒汗出吐下汗後或動經傷寒吐下後發汗虛煩脈甚微八九日心下痞硬氣上衝咽喉鬱冒經脈動惕者久而成痿汲水灌身那得好仲景云榮衛中風醫為大熱解肌發汗熱不止又汲水灌其身栗栗振寒則以重被覆之故汗出而冒煩汗下表里已先虛汗出表和痊可保仲景云太陽病下之而愈先復發汗以此表裡俱虛其人必冒冒家汗出自愈所以然者汗出表和故也第六十四證乾嘔歌陽明胃絡從頭走氣上逆行須便嘔嘔者胃不和也胃之絡從頭走足今氣上行而逆故嘔也陽明多嘔小柴胡仲景云傷寒五六日中風往來寒熱心煩喜嘔或胸中煩而不嘔小柴胡湯胸中有熱黃連候仲景云傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之第二十五水停心下茯苓甘發汗吐下後心下逆滿者茯苓甘草湯又方心下有水氣乾嘔者小青龍湯主之先嘔後渴五苓救仲景云嘔而渴者五苓散主之汗後餘熱竹葉湯汗後虛煩嘔逆者竹葉湯或橘皮湯煩虛梔子豉湯授煩虛者梔子豉湯主之得吐勿服余者嘔而有癕膿者不可治嘔膿盡乃愈又有少陰嘔證存真武湯中加減否仲景云少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛而利此為有水氣其人或咳或小便自利或下利或嘔者玄武湯主之論中有加減之法第六十五證吐逆歌吐有冷熱兩證異內脈外形當仔細吐有胃冷有胃熱者當以內脈外形辨之煩渴脈數手心熱此是胃熱之所致孫尚云脈來數手心熱煩渴者胃熱也竹茹湯證曾經汗下關脈遲胃中虛冷理中治肝脈遲胃虛也理中丸及湯主之膈上寒痰四逆湯仲景云若膈上有寒欲乾嘔者不可吐當溫之宜四逆湯汗後虛煩竹葉已汗後虛煩嘔吐者竹葉並橘皮湯證少陰欲吐復不吐必竟吐之當審記仲景云少陰病其人飲食入則心中溫溫欲吐復不得吐始得之手足寒脈弦遲此胃中實也不可下當吐之第六十六證霍亂歌嘔吐而利名霍亂仲景云病有霍亂者何也答曰嘔吐而利此名霍亂四肢逆冷誠斯患寒多不飲理中丸熱多而渴五苓散仲景云霍亂而頭痛發熱身體疼痛熱多欲飲水五苓散寒多不飲水者理中丸主之又云吐利汗出發熱惡寒四肢拘急手足厥四逆湯主之暑月忽然心撮痛兩腳轉筋多冷汗上吐下利並躁煩水沉香薷煎數盞暑月陰陽不和清濁相干食飲飫飽傷於脾胃而又取涼就冷陰陽交錯變成吐利三焦溷亂腹中撮痛大渴而煩兩腳轉筋者當用香薷散主之第六十七證頭疼歌三陽往往病頭疼隨證醫治平聲各異能三陽經絡上至於頭三陰至胸中而還故三陽之邪至頭必頭疼也太陽身熱麻黃證仲景云太陽病頭疼發熱身疼無汗而喘者麻黃湯主之無熱陽明胃氣蒸仲景云陽明病手足若厥者其人頭必痛若不嘔不飲手足不厥者其頭不痛少陽受病脈弦細小柴胡證自分明仲景云傷寒其脈弦細頭痛發熱此為屬少陽少陽不可發汗則譫語為屬胃胃和則愈不和則煩而悸三陰太少無頭痛為是厥陰之證形三陰之中太陰少陰無頭痛惟厥陰有也非時忽有痟首疾痟音消出周禮必是停痰濕氣並停痰濕氣亦令人頭痛第六十八證脅痛歌少陽膽經循脅過邪入此證痛無那那音糯仲景云少陽經絡循脅貫耳因邪在此則脅痛而耳聾心下堅滿引脅痛十棗醫治定須可仲景云太陽中風吐下嘔頭痛心下痞堅滿引脅下痛表解里未和者十棗湯主之陽明堅滿大便結項強不食並潮熱因而轉入少陽經唯小柴胡湯緊切仲景云陽明病不大便脅下堅滿舌上有苔者可與小柴胡湯又云項強脅下滿者可與小柴胡湯又云傷寒五六日中風往來寒熱胸脅苦滿默默不欲食小柴胡湯主之又云陽明病不解轉入少陽脅下堅滿乾嘔者小柴胡湯主之病人痞積貫臍旁痛引陰筋名臟結仲景云病者脅下痛素有痞積在臍旁痛引小腹入陰筋者名臟結第六十九證腹痛歌腹痛有實亦有虛要觀證與脈何如尺脈帶弦並泄利陽明虛痛建中須仲景云傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯關脈若實大便祕更加腹滿實中居仲景云病人不大便繞臍腹痛煩躁發作有時為有燥屎陰證腹痛四逆散仲景云少陰病四逆其人或咳或悸小便不利或腹中痛泄利下重者四逆散主之又云少陰病下利清穀裡寒外熱脈微欲絶脈不出或腹痛通脈四逆湯主之又云少陰病二三日不已至四五日腹痛小便不利真武湯主之下之腹痛桂枝祛太陽病醫反下之因腹滿時痛屬太陰桂枝加芍藥湯主之大實痛者加大黃湯也胃中有邪胸中熱嘔吐黃連湯可除仲景云傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之第七十證咽痛歌咽痛陰陽各異宜要須脈證兩參之脈浮而數吐膿血此是陽毒之所為傷寒脈浮數而大唾膿血千金外臺有烏扇膏治之脈沉兼細手足冷或加吐利少陰兮仲景云少陰法當咽痛而復吐冷少陰陰陽脈俱緊亡陽汗出要醫治仲景云其脈陰陽俱緊而反汗出必亡陽病屬少陰又有伏氣之為病非常寒冷著人肌咽喉先痛次下利作腎傷寒方可醫仲景云伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷寒非喉痹也病人云實喉中痛雖爾今復欲下利第七十一證咳嗽歌咳嗽三經要辨明太陽陽明與少陰太陽停水青龍候仲景小青龍二證皆云心下有水氣乾嘔發熱而咳者小青龍湯主之又云心下有水氣咳而微喘者小青龍湯小柴治咳值千金仲景云中風七八日心下悸小便不利身有微熱或咳者小柴胡湯主之陽明能食咽必痛咳時頭痛定難禁仲景金匱云冬陽明但頭眩不惡寒故能食而咳者其人咽必痛不咳者咽不痛又云冬陽明反無汗小便利二三日嘔而咳手足厥者其人頭必痛若不嘔不咳手足不厥者頭不痛少陰煩渴豬苓治泄利須還四逆靈仲景云少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之又云少陰四逆其人或咳小便不利腹中痛泄利者四逆湯忽然水氣因生咳真武湯功效最深仲景云少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛而利此為有水氣其人或咳或小便自利或下利或嘔玄武湯主之第七十二證遺尿歌風溫被下必失溲鼾睡難言自汗流仲景云風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲三陽合病身體重不覺遺尿也可憂仲景云三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足厥冷自汗宜白虎湯主之下焦不歸亦遺溺三者依方病可瘳仲景云下焦不歸其部則遺溲已上三證隨證治之可愈忽然直視並狂語腎絶如何得久留仲景云溲便遺失狂言反目直視者此為腎絶也第七十三證腹滿歌太陰腹滿必時痛仲景云太陰之為病腹滿吐食不下下之甚腹滿時痛合病腹滿身體重仲景云三陽合病腹滿身重難以轉側陽明腹滿口苦幹微喘小柴胡可用仲景云陽明中風口苦咽乾腹滿微喘發熱脈浮而緊下之則腹滿而小便難也谷疸之時且調胃仲景云陽明病脈遲欲成谷疸下之則腹滿潮熱更兼便不利勿令大下使之虛微和胃腑宜承氣仲景云陽明脈遲腹滿而喘有潮熱小承氣湯主之又云腹大滿而不大便者小承氣微和其胃氣勿令大下下後心煩而腹滿梔子厚朴湯宜爾仲景云傷寒下後心煩腹滿臥起不安者梔子厚朴湯汗後厚朴最為佳仲景發汗後腹脹者厚朴五物湯吐後小承當審諦仲景云傷寒吐後腹滿者小承氣湯主之此一證當仔細辨之太陰桂枝芍藥湯大實大黃湯可治仲景云太陽病醫反下之因腹滿時痛屬太陰桂枝芍藥湯大實痛則用大黃湯主之第七十四證蛔厥歌胃冷仍加發汗重因成蛔厥吐長蟲病源本屬厥陰證宜用烏梅與理中仲景云蛔厥者其人當吐今病者靜而復時煩此為臟寒蛔上入其膈故須臾得止得食而嘔又煩者蛔聞食臭必出其人當自吐蛔烏梅丸理中丸主之第七十五證自汗歌傷寒自汗證有九衛不和兮桂枝候仲景云病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯風溫風濕及傷風仲景云風溫為病脈陰陽俱浮自汗出身重多眠睡此風溫自汗也仲景云濕家之為病其人頭汗出背強欲得覆被向火又云額上汗出微喘此風濕自汗也仲景云太陽中風陰弱者汗自出此傷風自汗也中暑亡陽柔痓有仲景云太陽中暍者其人汗出惡寒身熱而渴此中暑自汗也仲景云傷寒自汗出小便數心煩微惡寒腳攣急桂枝加附子人參其間增桂令汗出附子溫經亡陽故也又云脈陰陽俱緊而反汗出為亡陽屬少陰此亡陽自汗也仲景云太陽病發熱汗出不惡寒名曰柔痓此柔痓自汗出霍亂下利四肢逆仲景云霍亂吐利汗出發熱惡寒四肢拘急手足厥冷四逆湯主之陽明多汗津液漏仲景云陽明病陽脈微而汗出少者為自和汗多者太過太過者陽積於內亡津液大便因堅也少陰無汗或有之額上手背時時透仲景云陰不得有汗故知非少陰也少陰有汗但額上手背有耳朱迪傷寒陰證訣云陰病額上手背皆有冷汗三二日中尚可行隨證治療莫令差更看病形深體究第七十六證頭汗歌病人裡虛而表實玄府不開腠理密無能作汗潤皮膚陽氣上行頭上出津液既竭五內干誤下重虛成大疾病人表實玄府不開汗不能浹於周身故上騰而發於頸額也汗既出多五臟津液寡少又重責之以汗必成大疾頭有汗兮多塗徑劑頸而還發黃病仲景云若不結胸但頭汗出余處無汗劑頸而還小便不利多必發黃往來寒熱表未解仲景云傷寒五六日其人已發汗而復下之胸脅微滿硬小便不利渴而不嘔但頭汗出往來寒熱而煩此為未解小柴胡湯桂枝湯手足冷時非陰證仲景云傷寒七八日頭汗出微惡寒手足冷心下滿口不欲食大便堅其脈細此為陽微結有表復有里也脈雖沉緊不得為少陰所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯肝乘肺部刺期門仲景云傷寒發熱嗇嗇惡寒其人大渴欲飲酢漿其腹必滿身自汗出小便利其病欲解此肝乘肺名曰橫當刺期門期門穴在乳下心中懊憹梔子應仲景云陽明病下之其外有熱手足溫不結胸心中懊憹若飢不能食但頭有汗出者宜用梔子湯主之膈間堅滿茯苓湯六者看詳宜審訂第七十七證欲得汗歌陽加於陰有汗期過關之脈要須知素問云陽加於陰謂之有汗俗謂過關之脈也有時兩手忽無脈恰似重陰欲雨時有時一手無脈或兩手無脈者有汗證也病人本虛必發顫不虛得汗顫何為不顫不汗自然解陽陰和順更何疑先曾吐下並亡血內無津液故如斯仲景云病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也病有不戰不汗出而解者何也答曰其脈自微此以當發汗若吐若下若亡血內無津液此陰陽自和必自愈止愛濈濈周身潤來時最忌水淋漓凡得汗欲令手足皆周漐漐一時益佳但不欲流離汗出如油是惡證忽加喘急病傾危仲景云汗出如油喘而不休此為命絶也停痰癥癖皆隔汗先須蕩滌要醫治傷寒最怕先有宿患如痰飲癖塊皆能隔汗不能得先開達渠道經絡通為佳水升火降陰陽合大汗來時命得回腎水升心火降坎離得交陰陽合和必大汗至矣第七十八證舌上苔歌陰陽俱緊鼻出涕舌上苔滑勿妄治蜷臥惡寒多嘔痰腹內痛者須成利仲景云脈陰陽俱緊口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也至七八日以來其人微發熱手足溫者此為欲解或到七八日以上反大熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也陽明濕痹並臟結色白苔滑多在舌二證見下文臟結無陽不可攻仲景云臟結者無陽證不往來寒熱其人反靜舌上滑苔者不可攻濕痹丹田應有熱仲景云濕痹之候舌上有苔者以丹田有熱胸中有寒濕痹中濕也陽明懊憹脅下堅梔子柴胡不徒設陽明有二證仲景云陽明心中懊憹舌上苔者梔子湯主之又云陽明病脅下堅滿不大便而嘔舌上苔者可與柴胡湯上焦得通津液得下胃氣因和身濈然汗出則解第七十九證下膿血歌傷寒表實里還虛熱氣乘虛腸里居下利膿血赤黃汁或如魚腦狀難拘病源傷寒病苦表實裡虛熱氣乘虛入於腸胃則下赤黃汁若濕毒氣盛則腹痛壯熱下膿血如魚腦或如爛肉汁太陽下之脈浮滑定知便血色殷於間切如仲景云太陽下之其脈浮而滑者必下血陽明下血而譫語熱入血室病難除仲景云陽明病下血而譫語者必為熱入血室頭汗出者當刺期門隨其實而瀉之濈濈然汗出則愈少陰膿血桃花證不爾刺之邪可祛仲景云少陰下利便膿血者桃花湯主之又云少陰病下利便膿血者可刺下利脈浮尺中澀或是發厥熱如初二證皆圊膿血利悉見長沙仲景書仲景云一證傷寒發熱四日厥反三四日復熱四日厥少熱多其病當愈四日至六日熱不除必清膿血又一證云下利脈又浮數尺中自澀其人必圊膿血第八十證晝夜偏劇歌衛氣循環不暫停晝則行陽夜在陰衛獨留陽陽蹺盛陽盛陰虛夜不寧忽若留陰陰蹺滿陰滿陽虛晝卻爭黃帝針經云衛氣者晝日行於陽夜行於陰衛氣不得入於陰常留於陽留於陽則陽氣滿滿則陽蹺盛而不得入於陰陰氣虛則夜不得寧也衛氣留於陰不得行於陽留於陰則陰盛陰盛則陰蹺滿不得入於陽陽氣虛故晝則爭而不安暮譫晝了陰虛證晝躁陽虛夜氣清仲景云婦人傷寒發熱經水適來晝則明瞭暮則譫語為熱入血室又云下之後復發汗晝則煩躁不得眠夜而安靜不嘔不渴無表裡證脈沉微身無大熱者乾薑附子湯主之熱入血室以陰虛而邪入之也故暮譫晝了下而復汗以亡陽而衛在陰也故晝躁夜靜要須調衛各歸分二氣諧和可漸平
