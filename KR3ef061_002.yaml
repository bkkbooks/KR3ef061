body:
  text: 卷二第二十一證陰盛隔陽歌身冷脈沉緊且細內雖煩躁不飲水此名陰盛隔陽證霹靂散用煩躁止脈沉緊而細不欲飲水者陰盛隔陽也當用附子霹靂散躁若止兮應得睡寒已散兮陰自退熱氣上行得汗痊火焰丹砂宜用矣第二十二證陰陽易歌男子陰腫多絞刺婦人腰痛並裡急傷寒瘥後便行房男名陽易女陰易熱上衝胸頭不舉眼中生花氣翕翕燒裩豭音加鼠橘皮湯選此用之醫可必仲景云傷寒陰陽易之為病身體重少氣小腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花痂胞赤膝脛拘急燒裩散主之此病男子則陰腫婦人則腰痛千金外臺云有豭鼠湯橘皮湯亦可用第二十三證傷寒歌脈浮緊澀是傷寒熱少寒多不躁煩傷寒脈浮緊而澀熱少寒多心不煩躁頭痛無汗身拘急微厥之時在指端腰脊疼痛色多慘唯宜發汗與通關學者先須要辨傷寒中風二證傷寒脈浮緊而澀中風脈浮而緩傷寒者惡寒不惡風中風者惡風不惡寒傷寒者無汗中風者自汗傷寒者面色慘淒中風者其面色和悅也大青龍證及麻黃熱多寒少亦其常傷寒大抵雖熱少寒多亦有熱多寒少者如麻黃證云發熱身痛大青龍證云脈浮緊發熱而惡寒熱多寒少不煩躁亦宜汗解正相當微弱無陽桂枝越仲景云太陽病發熱多寒少脈微弱者無陽也不可發汗用桂枝二越婢一湯尺遲血少建中湯尺脈遲者血少也宜建中湯仲景建中證云傷寒陽脈澀陰脈弦法當腹中急痛與建中湯遲弦雖不同皆少血之脈也淋家衄家不可汗小柴胡解自安康淋家衄家瘡家以至四動脈不可發汗者王實皆用小柴胡湯第二十四證中風歌惡風自汗是傷風仲景謂傷風為中風體熱頭疼病勢濃手足不冷心煩躁面色如常無慘容解在前篇脈浮而緩是本證寸大尺弱有時逢傷風脈雖浮而緩活人書云有尺脈弱寸口大者仲景云陽浮而陰弱陽浮者熱自發陰弱者汗自出桂枝敗毒獨活輩宜皆選用在其中活人書云治中風藥宜桂枝敗毒獨活散之類項強桂枝加乾葛仲景云太陽病項背強𠘧𠘧反汗出惡風者宜桂枝加葛根湯主之漏風加附可收功仲景云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之傷風傷寒何以判寒脈緊澀風浮緩寒必惡寒風惡風傷風自汗寒無汗解在前篇第二十五證傷寒見風脈中風見寒脈歌惡寒不躁微四逆脈浮而緩來無力惡風煩躁手足溫脈診緊浮來又澀傷寒反得傷風診中風卻見傷寒脈大青龍證是為宜調衛調榮斯兩得仲景云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之又云傷寒脈浮緩身不疼但重乍有輕時無三陰證者大青龍湯主之中風宜浮緩今卻浮緊傷寒宜浮緊今卻浮緩此中風見寒脈傷寒見風脈也要知其病加煩躁方可服之為最的脈微自汗又惡風誤用肉瞤並筋惕仲景云脈微弱汗出惡風者不可服之服之厥逆筋惕肉瞤此為逆也故王實止用桂枝麻黃各半湯第二十六證熱病中暍歌身熱惡寒頭痛楚心煩躁渴如何御身熱惡風頭痛心煩躁渴熱病中暑其證相似但脈不同耳語在下脈洪緊盛為熱病脈虛細弱為傷暑熱病脈必浮大洪緊傷暑之脈必虛細而弱詳考諸書暑脈多不一仲景云太陽中暍者身熱而脈微又云其脈弦細芤遲小便已灑灑然毛聳朱肱云脈虛身熱得之傷暑又曰熱病脈洪大中暑脈細弱當以意消息也傷暑面垢並背寒四肢倦怠汗無度口噤五苓白虎佳痰逆橘皮湯可愈仲景云手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚皮膚既緩腠理開灑然毛竦風寒惡繆加熱藥發斑黃可怪庸醫心術誤仲景云小便已灑然毛竦故其人可出而惡寒若行熱藥便發斑發黃也第二十七證五種溫歌溫病溫瘧風溫溫疫溫毒傷寒春月名溫病脈來浮數是其證發熱頭疼亦惡寒冬夏比之輕不甚升麻解肌為最良小柴竹葉宜相稱以上論溫病也素問云冬傷於寒春必病溫仲景云冬月冒寒氣不即病者藏於肌膚至春變為溫病故其證如此宜升麻解肌湯之類尺寸盛兮兼弦數重感於寒變溫瘧先熱後寒小柴胡但熱不寒白虎藥以上論溫瘧也仲景云若脈陰陽俱盛重感於寒者變成溫瘧素問云瘧脈自弦弦數者熱多朱肱云先熱後寒者小柴胡湯但熱不寒者白虎加桂湯主之濡弱陰脈浮滑陽此是風溫證候當頭疼身熱常自汗四肢不收鼾睡長當治少陰厥陰病誤汗黃耆防己湯以上論風溫也仲景云陽脈浮滑陰脈濡弱更遇於風變為風溫其病四肢瘲緩又云風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲也少陰火也厥陰木也當治炎火風木誤汗之則用黃耆防己湯救之也陽脈濡兮陰弦緊更遇溫氣來行令變成溫疫作天行少長皆同無異病熱溫寒清順時宜以平為期如斯正此論溫疫也仲景云陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫一歲少長皆同病者溫疫也最重溫毒為可怪陽脈洪數陰實大發斑癮疹如錦文咳兼心悶何由快此論溫毒也仲景云陽脈洪數陰脈實大更遇溫熱變成溫毒溫毒為病最重也故發斑生疹咳嗽心下快痞悶宜用元參升麻湯宜用元參升麻湯長沙仲景分明載第二十八證三種濕歌濕溫中濕風濕濕溫中濕並風濕三者同名而異實暑濕相搏成濕溫胸間多汗頭如劈兩脛逆冷苦妄言陽濡而弱陰小急以上濕溫證也第二中濕之為病脈來沉緩其名的一身盡痛兼發黃大便反快小便澀仲景云太陽病關節疼痛而煩脈沉而緩者此名中濕其候令人小便不利大便反快但當利其小便又云濕家之為病一身盡痛發熱身色如薰黃濕家其人但頭汗出背強欲得覆被向火若下之早則成胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也又云濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中無病病若頭中寒濕故鼻塞納藥鼻中則愈本是風雨山澤氣中之令人成此疾第三風濕脈但浮肢體痛重難轉側額上微汗身微腫不欲去被憎寒栗此論風濕也風濕之證仲景云一身盡痛發熱日晡所劇此名風濕此病傷於汗出當風或久傷取冷所致也故其脈浮額上有微汗不欲去被也發汗漐漐欲潤身風濕俱去斯為得仲景云風濕相搏一身疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也治風濕者發汗微微出者則是風濕俱去者也防己黃耆朮附湯對證用之醫可必防己黃耆湯朮附湯皆治風濕自汗第二十九證兩種痓歌發熱惡寒頭項強腰脊分明似反張瘛瘲口噤如癇狀此名痓病是其常仲景云病身熱暑寒頭項強急惡寒時頭面赤目脈赤獨頭面搖卒口噤背反張者痓病也先感風寒後感濕沉遲弦細脈相當仲景云太陽病發熱脈沉而細者名曰痓千金云太陽中風重感於寒濕則變痓病也仲景又云太陽發汗太多因成痓孫尚云病熱而脈沉細者難治也有汗不惡名柔痓無汗惡寒名曰剛無汗葛根有汗桂二痓皆宜續命湯無汗葛根湯有汗桂枝湯而分發汗解肌痓有剛痓有柔痓剛痓無汗柔痓有汗自宜續命湯仲景云太陽病發熱無汗反惡寒名曰剛痓汗出不惡寒者名曰柔痓腳攣齧齒皆陽熱承氣湯宜下最良以上皆熱證當用承氣湯亦名陽痙並陰痙名異實同安可忘痓音熾痙巨郢反名異實同也第三十證四證似傷寒歌食積虛煩寒痰腳氣食積虛煩並有痰更兼腳氣似傷寒四家病證雖云異發熱憎寒卻一般此四證雖非傷寒然發熱憎寒則同當以脈證辨之中脘寒痰胸痞滿脈浮自汗體難乾此痰證也有痰則胸中痞滿自汗脈浮食積令人頭必痛身不疼兮積證端氣口緊盛傷於食心煩脈數嘔吞酸此食積也食積則身不疼但嘔惡吞酸氣口脈緊盛而它脈數朱肱云氣口緊盛傷於食虛煩之脈不緊實但覺身心熱與煩身不疼兮頭不痛唯宜竹葉便須安孫尚云虛煩與傷寒相似但得病二三日脈不浮不惡寒身不疼痛但熱而不煩不可發汗發汗必危損如脈不緊實不甚痛但熱而或不煩非裡實亦不可下下之必危損唯可服竹葉湯主之又有腳氣之為病大便堅硬足行難兩脛腫滿或枯細莫與傷寒一例看此論腳氣也腳氣大便堅腳膝腫痛兩脛或有腫滿或有枯細者方其發時亦發熱憎寒嘔惡似傷寒證候也第三十一證可汗不可汗歌脈浮唯宜以汗解春夏用之何足怪仲景云脈浮宜以汗解又云大法春夏宜汗風若傷衛屬桂枝寒傷榮血麻黃快仲景云風則傷衛寒則傷榮傷衛屬桂枝傷榮屬麻黃二藥雖均曰發汗自有淺深也項強𠘧𠘧葛根湯心間水氣青龍對仲景云項背強𠘧𠘧者用麻黃葛根湯心下有水氣者小青龍湯主之少陰亦可微發汗附子麻黃泄其外仲景云少陰病得之二三日麻黃附子甘草湯微發其汗風濕發汗惡淋漓風氣去兮濕氣在唯宜浥潤遍周身濕氣風邪俱已退風濕惟要微微似欲汗出若大汗出者風氣雖去濕氣仍在也大抵尺遲汗為逆自此以下皆不可汗也仲景云尺中遲者精氣不足血氣微少不可汗微弦濡弱斯為害仲景云微反在下弦反在上弱反在關濡反在顛不可發汗發汗則寒栗至矣少陰沉細病在裡少陽弦細卻主內仲景云少陰脈沉細數病在裡不可發汗又云傷寒脈弦細頭痛發熱此屬少陽少陽不可發汗兩厥若汗必舌萎厥不可發汗發汗則聲亂咽嘶舌萎聲不得前四動汗之還窒礙仲景云動氣在上動氣在下動氣在左動氣在右皆不可發汗瘡家汗之必成痓淋家汗之便血殺衄家汗之額上陷咽乾汗之咽卻隘仲景云瘡家雖身疼痛不可攻其表汗之必痓淋家汗之必便血衄家汗之額上促急而緊直視不得眗不能眠咽乾燥者不可發汗王實傷寒證治皆用小柴胡湯亡血汗之必寒栗仲景云亡血不可發汗發汗則寒栗而振汗家重汗精神憊仲景云汗家重發汗必恍惚心亂小便已陰痛少陰強汗動經血仲景云少陰無汗而強發之必動其血虛煩壞病尤須戒仲景云虛煩壞病皆不可發汗宜用小柴胡湯主之月經適斷適來時切莫動經成冒昧此小柴胡證發則鬱冒不知人第三十二證可下不可下歌宿食不消當下之寸口浮大尺中微人病有宿食何以別之師曰寸口脈浮大按之反澀尺中亦微而澀當下之承氣湯主之陽明瘀熱茵陳證仲景云陽明瘀熱在裡身必發黃宜茵陳蒿湯主之譫語柴胡湯最宜金匱云汗出而譫語者有燥屎在胃中此風也過經乃下之宜大承氣湯大柴胡湯結胸大陷胸丸對瘀血抵當不可遲結胸宜大陷胸下之瘀血宜抵當丸下之大便堅硬惟承氣痞氣瀉心湯勿疑大便堅硬宜下以承氣湯痞氣虛靳宜下以瀉心湯脈若陽微下則痞自此以下不可下也金匱云陽微不可下下之則心下痞堅或兼虛細更難之仲景云脈微不可吐虛細不可下結胸浮大下之死金匱云結胸證其脈浮大者不可下下之則死四逆若下命傾危金匱云四逆厥者不可下下之則死虛家亦然惡寒自是有表證惡寒者表證在不可下嘔吐仍兼胃氣虧仲景云病吐者不可下之不轉失氣必溏利仲景云陽明病不大便六七日恐有燥屎欲知之法可與小承氣湯若腹中轉失氣者為有燥屎乃可攻之若不轉失氣者此但頭硬後必溏泄不可下陽明自汗下難為陽明自汗小便利此為津液內竭雖堅不可攻宜用蜜煎導之咽中閉塞尤須忌玉函經云咽中閉塞不可下下之則上輕下重臥則欲蜷身急痛趺陽浮數已虛脾仲景云趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也左右上下有動氣更在調和仔細醫仲景云動氣在右下之則津液內竭咽燥鼻乾頭眩心悸動氣在左下之則腹滿氣急動氣在上下之則掌握熱煩動氣在下下之則腹滿卒起頭眩第三十三證可吐不可吐歌傷寒大法春宜吐仲景云大法春宜吐宿食不消胸滿疰玉函云宿食在下管當吐之胸中鬱郁兼有涎寸口微數知其故玉函云胸上結實胸中鬱郁而痛不能食使人按之而反有涎唾下利日十餘行其脈反遲寸口微滑此可吐之以上皆可吐之證也脈微若吐大為逆仲景云脈微不可吐虛細不可下少陰寒飲無增劇仲景云少陰病其人飲食入則吐心溫溫然欲吐復不得吐始得之手足寒脈弦遲此胸中實可下也若膈上有寒飲者乾嘔不可吐當溫之矣四逆虛家止可溫誤吐內煩誰受責玉函金匱云四逆病厥不可吐虛家亦然又云太陽病強吐之則內煩論此皆不可吐者也第三十四證可火不可火歌中風忽然被火劫咽爛發黃津液竭仲景云太陽中風以火劫發其汗邪風被火劫血氣流泆其身則發黃至於咽爛矣榮微血弱與燒針煩躁昏迷併發熱仲景云其脈沉者榮氣微也加燒針則血留不行更發熱而煩躁也陽明被火必怵惕玉函云陽明脈浮緊加燒針者必怵惕太陽被火必清血仲景云太陽以火薰之不得汗其人必躁到經不解必清血少陰火劫小便難強責汗時翻作孽仲景云少陰病咳而下利譫語是為被火劫故也小便必難為強責少陰汗故也或致虛煩不得眠或致發黃中鬱結或致下血如豚肝或致譫言語無節仲景云陽明病加溫針則煩躁不得眠陽明病被火劫額上汗出必發黃瘀熱在膀胱蓄結成積則下血如豚肝太陽陽明被火劫必譫語此皆誤火之為病切須仔細加分別張苗欲汗外迎之卻取燒蒸布桃葉陳廩丘問張苗連發汗不出如何苗云亦可燒地布桃葉蒸濕之氣於外迎之可得汗也第三十五證可水不可水歌太陽汗後不得眠少與水飲當自全仲景云太陽病發汗後若大汗出胃中乾燥煩而不能眠其人欲飲當時飲之胃中和則愈矣厥陰煩渴思得水斟量多寡亦如然仲景云厥陰病渴欲飲水者與水飲之則愈也霍亂思水五苓妙嘔吐思水豬苓痊仲景云霍亂頭痛發熱身體疼痛熱多飲水五苓散主之又云嘔吐而病在膈上後必思水者急與豬苓散飲之也過多反病成喘咳小青龍證云水停心下成喘咳胃冷應知嘔噦愆仲景云胃中虛冷其人不能食飲水則噦小噀皮上有粟起仲景云病在陽當以汗解而反以水噀之若灌之其人熱卻不得去益煩皮上粟起者是也水洗結胸熱可憐仲景玉函云結胸身熱以水洗之灌之則益熱寒氣得水即成䭇䭇音噎食不下也仲景云寸口脈浮大醫乃不知而反飲冷水令汗大出以得寒氣冷必相搏其人即䭇可否醫工要達權第三十六證可灸不可灸歌少陰吐利時加嘔手足不冷是其候口中雖和背惡寒脈來微澀皆須灸仲景云少陰病其人吐利手足不逆反發熱者不死脈不足者灸厥少陰七壯又云少陰一二日口中和背惡寒者當灸之又云下利脈微澀者灸厥陰可五十壯陰毒陽虛汗不止腹脹腸鳴若雷吼面黑更兼指甲青速灸關元應不謬宋迪陰證訣云陰毒汗不止腹脹腸鳴面黧黑色指甲青者速灸關元一百壯至三百壯微數之脈卻慎之因火為邪恐難救仲景云微數之脈慎不可灸因火為邪則為煩逆焦骨傷筋血難復也脈浮熱甚灸為難唾血咽乾誠戾繆仲景云脈浮熱甚而灸之則為實實以虛治因火而動咽躁必吐血自微數之脈以下皆不可灸也第三十七證可針不可針歌太陽頭痛經七日不愈再傳成大疾法中當刺足陽明可使不傳邪氣出仲景玉函云太陽病頭痛至七日自當愈其經競故也若欲再傳者刺足陽明使經不傳則愈也桂枝服了煩不解風府風池刺無失仲景云太陽病服桂枝湯而反煩不解者當先刺風池風府卻與桂枝湯服之則愈也經來經斷刺期門正恐熱邪居血室仲景云婦人中風經水適來又云經水適斷熱入血室者刺期門隨其虛實而取之項強當刺大椎間脈有縱橫肝募吉仲景云太陽與少陽並病心下痞頭項強而眩當刺大椎第一間又曰肝乘脾名縱肝乘肺名橫皆當刺期門期門肝募也婦人懷身及七月從腰以下如水溢當刺勞宮及關元以利小便去心實仲景玉函云婦人傷寒懷身腹滿從腰以下重如水氣狀懷身七月太陰當養不養此心實當刺勞宮及關元穴小便利則愈大怒大勞並大醉大飽大飢刺之逆熇熇之熱漉漉汗渾渾之脈安可失素問云無刺熇熇之熱漉漉之汗渾渾之脈淺深分寸自依經此道相傳休祕密第三十八證傷寒可溫歌大抵冬宜熱藥溫大法冬宜服溫熱藥下利少陰有二門仲景云法中可溫者有九證皆下利與少陰兩家而已腹滿身痛先救里仲景云病發熱頭痛脈反沉若不瘥身體更疼痛用救其里四逆湯又云下利腹滿身體疼痛先溫其里宜四逆湯脈來遲緊痛仍存仲景云下利脈遲緊而痛未止者當溫之得冷者滿而硬腸垢少陰膈上有寒飲仲景云少陰病其人飲食入則吐心中溫溫欲吐復不得吐始得之手足寒脈弦遲若膈上有寒飲乾噦者切不可吐當溫之或加嘔利病難分脈沉微澀如斯證四逆理中湯可溫仲景云少陰下利脈微澀者即嘔行者必數更衣反少當溫之又云脈沉者急當溫之宜以四逆湯仲景玉函云諸溫者可與理中四逆附子湯熱藥治之第三十九證發熱歌太陽發熱惡寒栗陽明身熱汗自出少陽發熱多幹嘔三陽發熱證非一仲景云發熱而惡寒者發於陽也大抵三陽多發熱太陽證云嗇嗇惡寒翕翕發熱故太陽發熱則惡寒栗也陽明證云身熱汗出不惡寒反惡熱故陽明發熱則自汗也少陽證云頭痛發熱脅下堅滿乾嘔故少陽發熱則嘔大抵寒多為易治熱多寒少因寒極寒極生熱故熱多者寒之極寒多者病淺故易治焉解熱大小柴胡湯更看淺深為妙術若發熱無表證當用大小柴胡湯熱淺者宜小柴胡熱深者宜大柴胡小柴胡解肌大柴胡正下之也當以外證內脈為之准三陰初無發熱證唯有少陰兩證實脈沉發熱屬麻黃裡寒外熱宜四逆仲景云少陰病始得之反發熱脈反沉者麻黃細辛附子湯主之又云少陰病下利清穀裡寒外熱手足厥逆通脈四逆湯主之第四十證潮熱歌潮熱為實當與下仲景之言可憑藉仲景云潮熱者實也大法當宜下更看脈息浮與沉若但弦浮應未也浮為在表沉為在裡若但弦浮有表證在者未可下惡寒脈浮表證在與小柴胡湯勿下仲景云陽明病有潮熱若汗出多而微惡寒其熱不潮勿與承氣湯腹滿不通小承氣但和胃氣無多瀉仲景云若腹滿而不大便者可與小承氣湯微和其胃氣勿令大下潮熱之證有三說皆屬陽明小柴訣一則潮熱且吃噫二則微熱與溏泄仲景云陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗其人嗜臥一身及目悉黃小便難有潮熱時時噦宜與小柴胡湯主之又云陽明病發潮熱大便溏小便自可而胸脅滿不去者小柴胡湯主之三則日晡發其時發已微利增嘔噦噦乙劣切逆氣也仲景云其人日晡而發潮熱若劇者發則不知人太陽亦有一證存惟是結胸發潮熱仲景云太陽重發其汗而復下之不大便五六日舌上燥而渴日晡時小有潮熱從心下至小腹堅滿而痛者宜與大陷胸湯
