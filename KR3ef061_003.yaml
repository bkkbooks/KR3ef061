body:
  text: 卷三第四十一證往來寒熱歌陰陽相勝互爭強往來寒熱亦何常先寒後熱為陰盛先熱後寒責在陽陰陽交爭故往來寒熱陰氣勝故先寒後熱陽氣勝故先熱後寒也此疾大約有三證大小柴胡薑桂湯中風胸滿不欲食心煩喜嘔小柴良仲景云中風往來寒熱胸脅苦滿默默不欲食心煩喜嘔者屬小柴胡湯熱結在裡十餘日卻是大柴胡克當仲景云傷寒十餘日熱結在裡往來寒熱者宜大柴胡湯證已汗復下胸脅滿柴胡薑桂保安康仲景云傷寒五六日已汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱者柴胡桂枝幹薑湯主之第四十二證汗之而熱不退歌已汗復下脈加躁不食狂言謾祈禱此證謂之陰陽交死候難醫不可道素問云汗出而身復熱脈躁病不解汗衰狂言不能食病名為何也曰病名陰陽交也此其人所以汗出者皆生於穀穀生於精今邪氣隱藏於骨肉之間而得汗者邪衰而精勝則當食而不發熱熱者邪氣也汗者胃氣也今汗出而狂言不能食邪盛也死候可明矣得汗脈靜自然生汗後復熱命難保得汗而脈靜者生躁者死脈若浮數可再汗沉實之時下為好不得已須當汗下之浮尚可汗沉實尚可下之風溫之候屬葳蕤風溫自汗而熱屬葳蕤湯虛煩竹葉湯為寶虛煩自汗出而熱不可下宜竹葉湯更看虛實治為宜可細斟量休草草淳于意診齊中御府長信病意稱脈法熱病陰陽交者死今切之不交並陰陽者脈順清而愈其熱強未盡猶活也第四十三證下之而仍發熱歌病人脈微來又澀誤汗誤下皆為失脈微則氣虛脈澀則血少二者不可汗下既下而又汗榮衛皆虛故發熱也既汗亡陽斯惡寒又下陰微還熱極陰虛者陽必湊之既下則陰虛故陽入陰分所以內外皆熱素問云陽虛則外熱陰虛則內熱故熱極也最忌陰陽皆已虛熱又不止病斯亟更有勞復並食復失於調治並將息既下之後必須身涼今下之而復熱者不特汗下之誤亦有勞復食復二證勞復謂病後用力食復謂飲食過度失於調治之所致新瘥血氣尚虛羸勞復生熱無氣力勞復則無力而少氣脾胃尚弱食過多食復發熱還憎食食復則發熱嘔吐憎聞食臭矣小柴枳實梔子湯數者用之宜審的第四十四證惡寒歌惡寒發熱在陽經無熱惡寒病發陰仲景云發熱而惡寒者病發於陽也無熱而惡寒者病發於陰也陽宜發汗麻黃輩陰宜溫藥理中寧發於陽宜桂枝麻黃青龍輩發於陰宜四逆理中也嗇嗇惡寒桂枝證仲景云嗇嗇惡寒翕翕發熱桂枝湯證汗後惡寒虛不任汗後惡寒虛也脈微惡寒不可下尚宜發汗莫令深脈微不可下雖發汗亦微發汗可也亦有頭汗惡寒者柴胡加桂值千金頭有汗而惡寒者仲景用小柴胡加桂湯汗已惡寒心下痞附子增加入瀉心仲景云心下痞而復惡寒汗出者附子瀉心湯主之方第十八第四十五證背惡寒歌背陽腹陰各異位陽弱惡寒多在背素問云背為陽腹為陰背惡寒者陽弱也一則三陽合病生仲景云三陽合病額上生汗背惡寒者是其證一則少陰寒在外仲景云少陰病得之一二日口中和背惡寒者當以灸以附子湯主之欲識陰陽病不同口和不和各分配仲景云背惡寒口不仁者三陽合病也又云口中和背惡寒者少陰也合病口燥並不仁白虎抑陽是其對仲景以白虎治背寒抑退陽也少陰口和須灸之附子湯兼陰自退解在上第四十六證厥歌厥有冷厥有熱厥脈證當須仔細別冷厥才病四肢冷脈但沉微身不熱冷厥初得病便覺四肢逆冷脈沉而微身不甚熱也足多攣臥並惡寒引衣自覆仍不渴仲景云凡厥者陰陽之氣不相順接便為厥厥者手足厥冷是也故多足拘攣外惡寒引衣自覆不煩渴熱厥身熱頭且痛三四日內厥方發半日之間熱復回揚手擲足煩躁列熱厥與冷厥本自不同冷厥才病便厥熱厥必四五日內方發半日之間熱復來也揚手擲足心中煩躁要之熱深厥亦深熱微厥亦微相侵仲景云傷寒一二日至四五日厥者必發熱前厥者後必熱厥深熱亦深厥微熱亦微厥應下之而發汗者必口傷爛赤血氣不通手足冷醫人不識卻疑陰其脈沉伏而更滑頭面有汗指甲溫急便下之安可慢不然疑似禍相仍沉伏而滑伏熱在內也四肢雖厥指爪必溫皆陽實也急下之則愈又有正汗來相逼兩手一手忽無脈手足厥冷麵不澤細辛甘草湯脫厄朱肱云忽然兩手一手無脈手足厥冷者恐是正汗來故有此證用細辛甘草湯以助其汗汗出則可愈心下怔之成切怔忪懼貌忪職容切心動不定驚也厥有水脈緊厥時邪在裡仲景云傷寒厥而心下悸先治其水當與茯苓甘草湯以治厥不爾其水入胃必利又云病者手足冷脈乍緊者邪結在胸心下滿而煩即不能食病在胸中當吐之宜用瓜蒂散發熱七八日身冷此名臟厥為難治仲景云傷寒脈微而厥至七八日膚冷其人不安此為臟厥非蛔厥也蛔厥者其人當吐第四十七證結胸歌病發於陽下之早熱氣乘虛心懆懆仲景云病發於陽而反下之熱入因作結胸所以成結胸者下之早故也按之石鞕頭項強此是結胸證分曉仲景云結胸者頭項亦強如柔痓狀下之則和又云其脈浮緊心下痛按之如石堅脈浮與大未可下先汗後下無顛倒仲景云其脈浮大不可下下之則死熱毒上攻結在胸枳實理中應恰好大抵結胸未辨虛實先與理中加枳實佳大抵結胸有三說大結小結並水結有大結胸有小結胸有水結胸仲景云但結胸無大熱者此為水結在胸脅也但頭汗出者大陷胸湯治更有寒熱二證存熱實寒實宜區別仲景云太陽病從心下至小腹滿痛不可近者大陷胸湯主之此大結胸也又云小結胸病正在心下按之痛脈浮滑者小陷胸湯主之此小結胸也又云傷寒結胸熱實脈沉緊心下痛大陷胸湯主之此熱實者也又云寒實結胸無熱證者三物小陷胸湯白散亦可服此寒實者也此外有證名臟結脈浮關小沉細絶仲景云飲食如故時時下利寸脈浮關小細沉緊名曰臟結舌上白苔滑者難治也舌上滑苔不可醫痛引陰筋當死別仲景云病者脅下素有痞而在臍旁痛引小腹入陰筋者此名臟結死也結胸之狀如痓病從心至臍不可近仲景云結胸者項亦強如柔痓狀又云從心以下至臍不可近大陷胸湯主之心中懊憹並躁煩陽氣內陷非虛靳靳居焮切固也仲景云膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹心下因硬則為結胸也第四十八證痞歌痛為結胸否為痞音被關脈皆沉本同類仲景玉函云發於陰而反下之因作痞仲景傷寒論云病發於陽而反下之熱入因作結胸病發於陰而反汗之因作痞蓋痛則為結胸不痛則為痞結胸與痞寸脈浮關脈皆沉關上若浮且瀉心仲景云心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之發渴煩躁五苓對仲景云心下痞與瀉心湯其人渴而口煩躁小便不利者用五苓湯主之桔梗枳實湯最佳先與服之使行氣晉人治痞氣多作桔梗枳實湯往往便瘥以其下氣故爾下利雷鳴心下硬甘草瀉心湯可治仲景論中瀉心湯加減有五證皆為痞氣而設也但滿而不痛者宜半夏瀉心湯色黃手足溫者黃連瀉心湯惡寒汗出者附子瀉心湯乾嘔食臭脅下有水氣者生薑瀉心湯雷鳴心下硬心煩不得安者甘草瀉心湯也第四十九證發黃歌寒濕在裡不能散熱蓄脾中成此患濕熱宿谷更相搏鬱塞不消黃色綻巢氏云寒濕在裡則熱蓄於脾胃腠理不開瘀熱與宿谷相搏煩郁不得消則大小不通故身體面目皆變黃色頭面有汗齊頸止渴飲水漿曾莫間仲景云但頭汗出余處無汗齊頸而還小便不利身必發黃也浮滑緊數脈來時茵陳五苓皆可選茵陳蒿湯五苓散皆可選用之瘀血之證亦相類大便必黑此其異血證其間多發狂要須辨別無乖戾發黃與瘀血其證相似皆因瘀熱在裡故也但發黃者小便多不利瘀血則小便利小腹硬滿大便黑色仲景云太陽病六七日表證仍在脈微而沉及不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也又云小便自利其人如狂者血證諦也白虎之證亦身熱大率異同難辨別白虎不能遂發黃蓋為周身汗發越白虎與發黃證亦相似但白虎周身發汗故不能黃發黃證則余處無汗齊頸而還更有中濕並中風發黃大抵亦皆同濕則薰黃身盡痛目黃風中氣難通仲景云濕家之為病一身盡痛發熱身色如薰黃又有中風黃者但目黃氣難通也第五十證發狂歌發狂二證當別白陽毒蓄血皆憑脈發狂有二證有陽毒發狂有蓄血發狂陽毒發狂多幹嘔煩躁脈實並面赤難經云重陽者狂重陰者癲蓄血如狂脈沉微但欲嗽水不咽入小腹硬滿小便利不發寒熱大便黑仲景云陽明病七八日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之大抵當汗而不汗熱化為血如何散血上蓄兮喜忘多血下蓄兮還悶亂素問云血在上則忘血在下則狂更有火劫發狂時桂枝救逆湯加減仲景云傷寒之脈浮而醫以火迫劫之亡陽驚狂臥起不安屬桂枝去芍藥加蜀漆牡蠣龍骨救逆湯治第五十一證發斑歌溫毒熱病證兩般發斑隱疹滿身間仲景云風氣相搏則為隱疹身體為癢癢者為泄風溫毒冬月冒寒氣至春始發在皮端此證謂冬月冒寒至春陽氣盛發於表膚者熱病表虛而裡實熱毒不散錦紋斑不可發汗重開泄升麻湯輩可求安巢氏云熱病在表已發汗未解或吐下後熱毒氣不散煩躁譫語此為表虛里實熱氣燥於外故身體發斑如錦紋凡發斑不可用發汗藥令瘡重開泄更增斑爛也宜升麻元參湯熱毒乘虛入胃胃爛故發斑其熱微者赤斑出劇者黑斑出赤斑出者五死一生黑斑出者十死一生第五十二證發喘歌傷寒喘急是其常先論陽明及太陽太陽無汗麻黃證仲景云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之又一證太陽病下之微喘者表未解也桂枝加厚朴杏子湯主之又一證下後不可便行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯陽明潮熱小承湯仲景云潮熱短氣腹滿而有潮熱者小承氣湯主之水停心下喘而咳加減青龍必可當仲景云傷寒表不解心下有水氣發熱而咳或渴或利小腹滿而喘者小青龍湯陰證喘時須喘急反陰丹輩用為良陰證喘與陽證異其喘必急宜用反陰丹主之第五十三證發渴歌脈浮而渴太陽病有汗而渴陽明證渴而自利屬少陰三者不同須審訂仲景云發汗已脈浮數煩渴者五苓散主之又云陽明病汗出多而渴者不可與豬苓湯以其汗多胃中燥豬苓復利其小便故也又云少陰病其人欲吐復不得吐而煩但欲寐五六日自利而渴者屬少陰此三證渴雖同其病則異也自非大渴莫與水小渴唯宜滋潤爾若令劇飲心下滿變成水結難調理仲景云太陽病胃中干燥煩不得眠其人欲飲水當稍飲之胃中和則愈渴太陽無汗休供白虎湯汗後脈洪方可與此證思之要審量太陽病須汗後渴方可行白虎亦須白虎加人參也仲景云傷寒脈浮發熱無汗者表未解不可與白虎湯渴者白虎加人參主之渴陽明有汗且休供五苓小便不利汗仍少脈浮而渴用為精仲景云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓復利其小便故也又云若脈浮發熱渴欲飲水小便不利豬苓湯主之陽毒躁盛黑奴用中暑黃連丸酒蒸黑奴丸千金方也酒蒸黃連丸活人書方二藥雖非仲景之方然治陽毒中暑最為有效第五十四證吐血歌諸陽受病蘊邪熱在表當汗汗不發巢源方云吐血者皆由諸陽受邪熱初在表應發汗而汗不發致使熱毒入深結於五臟內有瘀積故吐血也熱毒入深結在中瘀血既停須吐血輕者犀角地黃湯重者抵當方能絶小品犀角地黃湯主傷寒及溫病應發汗而不發之內瘀蓄血及鼻衄吐血者此湯主之抵當湯治瘀血在內大下寸口脈沉遲吐血升麻安可缺陽毒升麻湯證云陽毒二藥吐下之後便成陽毒或吐血下痢其脈浮大數面赤斑如錦紋唾膿血者此湯主之第五十五證衄血歌太陽陽盛必須衄衄已解時何幸福巢氏云脈浮緊發熱其身無汗自衄者愈蓋太陽病有因衄血而便自解者浮緊無汗系麻黃脈浮自汗桂枝屬二者服之不中病脈尚如前宜再服仲景云傷寒脈浮緊不發汗因致衄者麻黃湯主之故自汗脈浮者宜桂枝也麻黃桂枝正分表裡服之不中病尚宜再服此活人書之意也豫謂此候不可不審察細詳仲景之書又云陽明病口燥但欲飲水不咽入者此必衄衄家不可攻其表汗出額上陷直視不能眠不得眴又云亡血家不可攻其表汗出則寒栗而振衄後脈微血已虛慎勿服之令病篤且看犀角地黃湯不止茅花須預速若脈微血虛則麻黃桂枝皆不可用也小品犀角地黃湯活人書云茅花湯皆可用陰證本來無此候少陰強發紅來觸下厥上竭不可醫血流口鼻或耳目仲景云少陰病但欲無汗而強發之則衄血不知從何道出或從口鼻耳目中出是為下厥上竭為難治第五十六證吃噫歌胃虛為噦名吃噫吃聲啞語難也噫胸氣飽出息多因吐下緣虛極古人方書無吃字惟有噦朱肱以噦者吃氣也橘皮乾姜退陰散或灸乳下皆得力灸法見活人書並良方中又有陽明小柴胡視其前後部何如仲景云傷寒噦而渴者視其前後知何部不利利之則愈因虛攻熱必生噦仲景言之豈妄歟仲景云其人本虛攻其熱必噦噦火外切又於月切逆氣也更有一證欲作汗陰陽升降致屯如胃氣上逆無休止逡巡中汗自然除龐安常說第五十七證譫語歌實則譫語虛鄭聲兩般相似最難明仲景云實則譫語虛則鄭聲鄭聲者重語也直視譫語而喘滿者死下利不止亦死矣大小便利手足冷更兼脈細是虛形此鄭聲之證也脈來洪數二便祕譫語為因實得名譫語證本非一或因下利或胃實仲景云下利而譫語為有燥屎承氣湯主之又云陽明病其人多汗津液外出胃中燥大便必堅堅者譫語承氣湯主之三陽合病或瘀血或是熱入於血室仲景云三陽合病腹滿身重難以轉側口中不仁譫語又云脅下滿如結胸狀其人譫語此皆熱入血室大抵發熱陽脈生反見陰脈斯為逆譫語發熱見陽脈者生見陰脈者死第五十八證煩躁歌傷寒煩躁證如何陽明證與少陰科陽明脈長大便祕仲景云陽明脈長自汗出醫復重發其汗其人微煩不了了者此大便堅也傷風之候太陽多仲景云太陽病服桂枝湯煩不解者宜刺風池風府卻與桂枝湯又云服桂枝湯復大煩渴不解脈洪大者白虎湯陰盛陽虛亦煩躁少陰之證莫令訛大抵陰盛陽虛亦煩故少陰證多煩躁少陰腎也腎惡燥故熱邪傳入腎經則煩躁宜矣仲景云少陰病惡寒而倦則自煩欲去其衣者可治又云自利煩躁不得眠者死汗下而煩醫者誤仲景云傷寒吐下發汗虛煩脈甚微八九日心下堅痞經脈動惕者久而成萎病解而煩氣未和更有虛煩宜竹葉莫作傷寒致誤他孫兆云虛煩熱疾與傷寒相似得病二三日脈不浮不惡寒身不疼痛但熱而煩非表候不可發汗如脈不緊實病但熱或不煩非裡實不可下汗下必危損但用竹葉湯主之其病自然而愈也第五十九證懊憹歌傷寒懊憹意忡忡懊於告反憹千金音作農外臺云奴凍切或實或虛病胃中結胸下早陽內陷陽明誤下胃虛空懊憹證有三此一證胃中因下空虛而致也仲景云胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸又云陽明證其脈浮緊下之則胃中空虛客氣動膈心中懊憹舌上白苔者梔子湯主之若渴欲飲水者白虎湯主之客氣動膈心中躁梔子湯兼大陷胸結胸陷胸湯主之白苔梔子湯主之胃中燥屎宜承氣腹滿頭堅不可攻此一證胃中下後有燥屎也仲景云陽明病下之心下懊憹微煩胃中有燥屎者可攻其人腹微滿頭硬後溏者不可下之有燥屎者宜承氣湯主之第六十證怫鬱歌怫鬱有虛亦有實要須仔細明證脈怫音拂蓋燥屎者實也吐下者虛也燥屎唯宜承氣湯仲景云病者小便不利大便乍難乍易時有微熱怫鬱不得臥有燥屎故也承氣湯主之吐下極虛胃寒疾仲景云傷寒大吐下後極虛復極汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故致此也火薰汗出目須黃仲景云寸口脈陽浮陰濡而弱醫如火薰郁令汗出客熱因火而熱發怫鬱蒸肌膚身目為黃二陽並病面還赤仲景云二陽並病太陽初得病時先發其汗汗先出不徹因轉屬陽明續自微汗出設面色緣緣正赤者陽氣怫鬱當解之薰之也脈來洪大榮氣長仲景云寸口脈洪而大者榮氣長榮氣長則陽盛怫鬱不得出聲隨經醫治何由失
