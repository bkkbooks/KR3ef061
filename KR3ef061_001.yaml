body:
  text: 卷一第一證傷寒脈證總論歌大浮數動滑陽脈陰病見陽生可得沉澀弦微弱屬陰陽病見陰終死厄仲景云脈大浮數動滑此名陽也脈沉澀若弦微此名陰也陰病見陽脈者生陽病見陰脈者死陰陽交互最難明輕重斟量當別白脈雖有陰陽須看輕重以分表裡在下文輕手脈浮為在表表實浮而兼有力但浮無力表中虛自汗惡風常淅淅傷寒先要辨表裡虛實此四者為急仲景云浮為在表沉為在裡然表證有虛有實浮而有力者表實也無汗不惡風浮而無力者表虛也自汗惡風也重手脈沉為在裡裡實脈沉來亦實重手無力大而虛此是裡虛宜審的里證亦有虛實脈沉而有力者裡實也故腹滿大便不通沉而無力者裡虛也或泄利或陰證之類以上八句辨表裡虛實盡矣風則虛浮寒牢堅水停水滀必沉潛動則為痛數為熱支飲應須脈急弦太過之脈為可怪不及之脈亦如然仲景云風則虛浮寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩太過可怪不及亦然邪不空見中必有姦榮衛太盛名高章高章相搏名曰綱榮衛微時名惵徒頰切恐懼也卑惵卑相搏損名彰榮衛既和名緩遲緩遲名沉此最良九種脈中辨虛實長沙之訣妙難忘仲景云寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩榮氣和名曰遲緩遲相搏名曰沉大抵仲景脈法論傷寒與雜病脈法異故豫嘗撰仲景三十六種脈法瞥瞥有如羹上肥此脈定知陽氣微縈縈來如蛛絲細卻是體中陰氣衰脈如瀉漆之絶者病人亡血更何疑仲景云脈瞥瞥如羹上肥者陽氣微也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絶者亡血也陽氣衰千金云作陰氣衰陽結藹藹如車蓋陰結循竿亦象之仲景云藹藹如車蓋者陽結也纍纍如循竿者陰結也陽盛則促來一止陰盛則結緩而遲此謂促結二脈也仲景云脈來緩時一止名曰結脈來數時一止名曰促脈陽盛則促陰盛則結縱橫逆順宜審察殘賊災怪要須知仲景云脈有相乘有縱有橫有逆有順何謂也曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也又曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名殘賊能為諸賊作病也又問曰脈有災怪何謂也答曰舊時服藥今乃發作故謂災怪脈靜人病內虛故人安脈病曰行尸仲景云脈病人不病曰行尸以無主氣故眩僕不知人人病脈不病名曰內虛以無穀神雖困無苦右手氣口當主氣主血人迎左其位氣口緊盛食必傷人迎緊盛風邪熾左為人迎右為氣口人迎緊盛傷於風氣口緊盛傷於食也數為在腑遲為臟浮為在表沉在裡仲景云浮為在表沉為在裡數為在腑遲為在臟脈浮而緩風傷榮浮緊兼澀寒傷衛脈微大忌令人吐欲下猶防虛且細仲景云脈微不可吐虛細不可下沉微氣弱汗為難三者要須常審記孫用和云陰虛脈沉微而氣弱者不可汗三者汗下吐三候脈有不可行者切當審也陽加於陰有汗證左手沉微卻應未素問云陽加於陰謂之汗趺陽胃脈定死生仲景説趺陽脈者凡十有一太溪腎脈為根蒂傷寒必診太溪趺陽者謂以腎脈胃脈為主仲景譏世人握手不及足者以此脈來六至或七至邪氣漸深須用意浮大晝加並屬陽沉細夜加分陰位九至以上來短促狀若湧泉無入氣更加懸絶漸無根命絶天真當死矣孫尚云脈及七至六至以上浮大晝加病沉細夜加病更及八至精氣消神氣亂必有散脫精神之候須切急為治療又加之九至十至雖和扁亦難救如八至九至加以懸絶懸絶者無根也如泉之通脈無入氣天真盡而必死矣病人三部脈調勻大小浮沉遲數類此是陰陽氣已和勿藥自然應可喜仲景脈寸口關上尺中三處大小浮沉遲數同類雖有寒熱不解此脈已和雖劇當愈第二證傷寒病證總類歌傷寒中風與溫濕熱病痙暍並時疫證候陰陽雖則同別為調治難專一以上七證大略雖相似須別作調治一則桂枝二麻黃三則青龍如鼎立精對無差立便安何須更數交傳日孫尚云一桂枝二麻黃三青龍三日能精對無差立當見效不須更候五日轉瀉反致壞病也發熱惡寒發於陽無熱惡寒自陰出仲景云發熱而惡寒者發於陽也無熱而惡寒者發於陰也陽盛熱多內外熱白虎相當並竹葉白虎湯竹葉石膏湯皆治內外熱證陰盛寒濕脈沉弦四逆理中為最捷孫兆云陰盛寒濕則用四逆湯理中丸熱邪入胃結成毒大小承氣宜疏泄熱邪入胃久則胃傷爛宜調胃或大小承氣湯胸滿宜用瀉心湯胸滿證候用大小瀉心湯結胸痞氣當分別按之不痛為虛靳按之若痛為實結淺深大小陷胸丸仲景方中不徒設孫兆云結胸痞氣兩分淺深則大小陷胸丸茵陳可治發黃證柏皮治痢兼下血發黃疸熱則用茵陳湯下利腸毒惡痢下血柏皮湯小便不利更喘滿煩渴五苓安可缺利小便止煩渴用五苓散半在裡兮半在表加減小柴胡有法小柴胡治半在表裡仲景有加減法夜中得脈日中愈陰得陽兮災必脫日中得脈中夜安陽得陰兮自相悅陰陽調順自和同不須攻治翻為孽孫尚云凡傷寒三日脈微而微數以順四時身涼而和者此名欲解也夜半得脈來日日中愈陰得陽而解也日中得脈夜半愈陽得陰而和也陰陽和同爾第三證表證歌身熱惡寒脈又浮偏宜發汗更何求仲景云脈浮宜以汗解之要須手足俱周遍不欲淋漓似水流金匱云凡發汗欲令手足皆周漐漐一時間益佳但不欲流離若病不解當重發汗汗多則亡陽陽虛不得重發汗也輕則隨時與和解重須正發病當瘳仲景有和解之者有正發之者和解若小柴胡桂枝是也正發若麻黃之類是也初春陽弱陰尚勝不可亟奪成擾搜夏時暑熱脈洪大玄府開時汗易謀初春陽弱不可大發汗以擾乎陽夏則玄府汗空開故易汗不可汗脈微而弱更兼尺中脈遲緩金匱云脈微不可發汗無陽故也又云尺中脈遲榮不足血氣少不可汗微弱無陽遲少血安可麻黃求發散更有衄血並下血仲景云衄家不可發汗發汗則額上陷亡血家不可發汗則寒栗而振風溫濕溫如何發壞病虛煩且慎之腹間動氣宜區別此五證皆不可汗解在第三十一婦人經水適來時此是小柴胡證決忽然誤汗表裡虛鬱冒不知人作孽婦人經水適來適斷屬小柴胡證誤汗鬱冒不知人第四證里證歌不惡寒兮反惡熱胃中乾燥並潮熱陽明證身熱汗自出不惡寒反惡熱當下之又云潮熱者實也宜下之手心腋下汗常潤小便如常大便結腹滿而喘或譫語脈沉而滑里證決手心與兩腋下潤小便如經大便結硬皆里證也內實則腹滿而喘沉而滑者病在內是曰里證也陽盛陰虛速下之安可日數拘屑屑仲景云陽盛陰虛汗之則死下之則愈蓋陽盛則外熱陰虛則內熱內外皆熱故當下雖三二日便可下不必四五日過經也失下心胸皆疰悶冒郁不安成熱厥失下則熱極生寒故冒而厥厥則半日後復熱也庸醫不曉疑是陰誤進熱藥精魂絶庸醫見厥便以為陰誤服熱藥則發斑發黃不知人也三陰大約可溫之積證見時方發泄太陰腹滿或時痛少陰口燥心下渴積證悉具更無疑要在安詳加審別三陰大約可溫唯有積證當下仲景云太陽病醫反下之因腹滿時痛屬太陰桂枝加芍藥湯主之其大實痛則大黃湯主之又云少陰口燥咽乾急下之宜承氣湯如此者當下之也病猶在表不可下脈浮更兼虛細者仲景云脈浮為在表又云虛細不可下之惡寒嘔吐小便清惡寒者表未解金匱云欲吐者不可下小便清者知不在裡而在表也不轉矢氣應難瀉不轉矢氣者屎強硬其後必溏也大便堅硬小便數脾約證陽明自汗津液寡蜜兌證如斯之類下為難莫便參差成誤也第五證表裡寒熱歌病人身熱欲得衣寒在骨髓熱在肌先與桂枝使寒已小柴加桂次溫之病人身寒衣褫退寒在皮膚熱在髓白虎加參先除熱桂黃各半解其外仲景云病人身大熱反欲得衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也仲景俱無治法朱肱云寒在骨髓先與桂枝次與小柴胡加桂湯熱在骨髓先以白虎加人參湯以除其熱次以桂枝麻黃各半湯以解其外也病有標本並始末先後不同當審察裡寒表熱脈沉遲裡熱表寒脈必滑朱肱云裡寒表熱者脈沉而遲裡熱表寒脈必滑也第六證表裡虛實歌脈浮而緩表中虛有汗惡風腠理疏浮緊而澀表卻實惡寒無汗體焚如傷寒最要辨表裡虛實為先有表實有表虛有裡實有裡虛有表裡俱實有表裡俱虛先辨此六者然後用藥無不瘥矣蓋脈浮而緩又惡風有汗此表虛中風證也脈浮緊而澀尺有力惡寒無汗此表實傷寒證也脈沉無力裡虛證四逆理中為對病沉而有力緊且實柴胡承氣宜相應裡虛宜溫之故用四逆理中裡實宜下之故用柴胡承氣又有表和而里病下之則愈斯為正里和表病汗為宜忽然誤下應難拯外臺云表和里病下之則愈汗之則死里和表病汗之則愈下之則死虛則溫之實瀉之病形脈證要相宜更兼藥餌如精對立便安康待甚時孫尚云精對無差立當見效不必三日以前汗五日以後下也第七證急救表裡歌傷寒下後表裡虛急當救療莫躊躇下利不止身疼痛救里為先四逆歟忽若清便自調適卻宜救表桂枝徒切莫遲延生別病過街脈變在斯須仲景云傷寒脈下之續得下利消穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆救表宜桂枝第八證無表裡證歌既無里證又無表隨證小柴胡治療大便堅鞕脈浮數卻與大柴胡極妙仲景云病人無表裡證發熱七八日脈浮數可與大柴胡湯下之七八日後至過經證候如斯當辨曉何況熱實睛不和常覺目中不了了仲景云傷寒六七日目中不了了睛不和無表裡證大便難微熱者急下之大承氣柴胡第九證表裡水歌有水須分表和里安可妄投增病勢乾嘔微利咳發熱謂表有水青龍諦仲景云傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或喘者小青龍此謂表有水也忽若身涼並汗出兩脅疼痛心下痞表解爭知里未和十棗湯方能主治太陽中風心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之第十證表裡兩證俱見歌脈來浮大表證爾便赤煩渴卻在裡脈浮者表證也小便赤而煩渴又卻有里證也表裡兩證俱見時當用五苓與調理此證宜用五苓散蓋五苓治內外俱熱又如大便數日結頭痛更兼身有熱其人小便卻又清亦是兩證當區別大便結硬頭痛身熱小便卻清知不在裡而在表也大便堅鞕脈沉細里證當下分明諦頭汗出時微惡寒手足兼冷卻非是仲景云傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結有表復有里也脈沉亦在裡也此為半在表半在裡焉仲景著論非一端要在審詳而已矣仲景云中有兩證者凡十餘法故此略舉一二為例第十一證三陰三陽傳入歌尺寸俱浮屬巨陽一二日內病如常經絡一連風府穴頭項痛兮腰脊強仲景云尺寸俱浮者太陽受病當一二日發以其上連風府故頭項痛腰脊強脈長陽明為受病二三日內斯為應挾鼻絡目是其經目痛鼻乾眠不穩仲景尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥也少陽經絡貫耳中脈弦脅痛耳應聾四日以前皆在腑汗之即退易為功仲景云尺寸俱弦者少陽受病也當三四日發以脈循脅於耳故胸脅痛而耳聾此三經受病未入臟故可汗也四五日中得太陰太陰之脈細而沉布胃絡嗌嗌乾燥脾宮腹滿病難禁仲景云尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾矣少陰傳到脈沉緊貫腎絡肺系舌本口燥舌乾渴不休五六日中病有準尺寸脈俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴七八日至厥陰經煩滿囊縮可憂驚三陰受邪已入臟卻宜瀉下自和平仲景云尺寸俱微緩者厥陰受病也當六七日發以其循陰器絡於肝故煩滿而囊縮必三陰皆已入臟故可下而已也六經已盡傳亦遍土不受邪脈來緩水火相交氣已和云與雨至斯為汗若傳至厥陰其脈來緩者脾土不再受克故水升火降氣和而大汗解矣第十二證陰陽兩感歌傷寒熱甚雖不死兩感傷寒漫料理仲景云凡傷於寒則發為熱雖甚不死若兩感於寒而病者必死又曰兩感病俱作治有先後發表攻裡本自不同故漫料理可也一日太陽少陰病腹痛口乾煩飲水太陽膀胱也少陰腎也為表裡故仲景云太陽與少陰俱病則腹痛口乾煩滿而渴二日陽明合太陰腹滿身熱如火熾不欲飲食鼻內干妄言譫語終難睡仲景云二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽合厥陰耳聾囊縮不知人厥逆水漿不入口六日為期是死辰仲景云三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入口不知人者六日死矣第十三證陽證陽毒歌太陽陽明與少陽三陽傳入是其常一二日太陽二三日陽明三四日少陽各以其經傳入也太陽脈浮惡寒氣陽明惡熱脈來長太陽脈浮陽明脈長太陽惡寒惡風陽明不惡寒反惡熱少陽口苦脅下滿往來寒熱脈弦張仲景云少陽之為病口苦咽乾目眩又曰太陽病不解轉入少陽者脅下堅滿往來寒熱其脈弦細陽若獨盛陰暴絶變為陽毒必發狂三陽病不治必變為陽毒內外熱結舌又卷鼻中煤煙不可當脈應洪實或滑促宜用升麻梔子湯第十四證陰證陰毒歌飲食不節陰受之太陰腹脹病在脾素問云起居不節陰受之飲食不節則陰受之傷寒四五日傳太陰太陰脾經也故其腹脹滿少陰腎病脈微細心煩但寐渴無時仲景云少陰之為病脈微細但欲寐又云少陰但欲寐五六日自利而渴厥陰氣上衝心下飢不欲食食吐蛔音回仲景云厥陰為病消渴氣上衝心飢不欲食食吐蛔陰病若深陽頓絶變成陰毒更何疑四肢逆冷臍築痛身如被杖痛可知宋迪云積陰盛於下則微陽消於上故其候沉重四肢逆冷臍腹築痛身疼如被杖或因冷物傷脾胃或因欲事腎經衰內感伏陰外寒氣腰重頭疼覺倦疲陰毒本因腎氣虛寒嗜欲過多或傷冷物復傷風邪內既伏陰外又感寒或先感外寒而內伏陰內外皆陰故陽氣不守遂發頭疼腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷矣額上手背皆冷汗二三日內尚支持額上手背皆有冷汗二三日內或可起行不甚勞重六脈沉細時來疾尺部短小力還微寸口有時或來大誤經轉瀉若何醫陰毒診之則六脈俱沉細而疾尺部短小寸口或大六脈俱浮大或沉取之大而不甚疾者非陰證也誤轉瀉則渴轉甚躁轉急陰病漸深腹轉痛心胸䐜脹鄭聲隨虛汗不止咽不利指甲青黑麵色黧陰證深則咽喉不利心下脹滿結硬躁渴虛汗不止或時鄭聲指甲面色俱青黑仲景云虛則鄭聲一息七至沉細疾速灸關元不可遲六脈沉細而疾一息七至以來有此證者速宜灸關元二三百壯穴在臍下三寸更兼金液來蘇治庶得陽回命可追灸畢更以金液來蘇丹助之庶幾陽復也第十五證太陽陽明合病歌太陽陽明同合病仲景法中有三證自利宜服葛根湯但嘔卻加半夏應喘而胸滿屬麻黃慎勿下之輕性命循規守矩治為宜要使沖和自安靜仲景三證一者太陽與陽明合病則自利葛根湯主之二者合病不下利但嘔者葛根加半夏湯主之三者太陽陽明合病喘而胸滿者不可下宜麻黃湯第十六證太陽少陽合病歌太陽少陽合病時亦須下利更何疑下利黃芩湯可用若嘔還加半夏奇仲景云太陽少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯第十七證三陽合病歌腹滿身重難轉側面垢遺尿譫語極三陽合病口不仁白虎湯功更奇特仲景云三陽合病腹滿身重難以轉側口中不仁譫語遺溺發汗則譫語下之則額上生汗手足厥冷自汗白虎湯主之第十八證太陽少陽並病歌太少並病證有二汗下差之皆致斃頭痛眩冒如結胸誤若汗時譫語至肺俞肝俞皆可刺譫語卻刺期門是仲景一證云太陽少陽並病頭痛眩冒時如結胸心下痞硬當刺肺俞肝俞不可發汗發汗則譫語脈弦五日譫語不止當刺期門頸項強時刺大椎此候在心當切記一證云太少並病心下硬頸強而眩者當刺大椎肺俞肝俞慎勿下第十九證陰證似陽歌煩燥面赤身微熱脈至沉微陰作孽脈來沉微者陰也陰極生熱故煩躁面赤身熱陰證似陽醫者疑但以脈憑斯要訣但以脈為據不必守證也身熱裡寒陰躁盛面戴陽兮下虛證身熱也裡寒也煩躁者陰盛也面戴陽者下虛故也此皆陰證似陽也陰發躁兮熱發厥物極則反皆理性陰極則生躁熱極則發厥物極則反皆物之理性也第二十證陽證似陰歌小便赤色大便祕其脈沉滑陽證是四肢逆冷伏熱深陽證似陰當審諦小便赤大便祕脈沉滑陽證也陽極生陰熱極生寒故令四肢逆冷以其伏熱深也醫見四肢逆冷便以為陰則誤也當仔細審詳輕者且宜供白虎重者須當用承氣重陽如陰理宜然寒暑之變亦如是
