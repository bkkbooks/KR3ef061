body:
  text: 卷五第八十一證循衣摸空歌傷寒吐下仍不解大便不利潮熱在循衣摸床惕不安獨語猶如見鬼怪微喘直視不識人譫語狂言還可駭大承服後脈弦生忽若澀兮死何悔仲景云傷寒吐下後未解不大便五六日至十餘日其人日晡所發潮熱不惡寒如見鬼神狀若劇者發則不識人循衣妄撮床惕不安微喘直視脈弦者生澀者莫不死仲景云太陽中風以火劫之兩陽相熏灼其身發黃鼻衄血循衣摸床小便利者可治華他云病人循衣縫不可治第八十二證筋惕肉瞤歌病人肉瞤並筋惕汗過經虛真武敵仲景云大青龍湯證云若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也又云太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之不然邪入大經中狀如瘈瘲驚癇疾發汗動經身振搖宜用茯苓桂枝術仲景云傷寒若吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖者茯苓桂枝白朮甘草湯又云傷寒吐下後汗虛脈微眩經脈動惕者久而成痿動氣在左誤下之忽爾肉瞤最為逆仲景云動氣在左不可發汗發汗則頭眩汗不止怵惕肉瞤第八十三證口燥咽乾歌脾中有熱胃乾枯口燥咽乾津液無陽明白虎加參證少陽口苦小柴胡仲景云陽明病脈浮緊咽乾口苦口乾舌燥者白虎湯又云少陽之為病口苦咽乾目眩者宜小柴胡湯咽乾慎不可發汗發汗無津氣愈虛仲景云咽喉乾燥不可發汗少陰口燥急須下腎經少水致焚如仲景云少陰病得之二三日口燥咽乾急下之宜服承氣湯又云少陰病二三日咽痛者與甘草湯不瘥與桔梗湯此證切宜審用之蟲蝕上部聲嗄惑咽乾蝕臟下上聲名狐仲景云狐惑之病蟲蝕上下部蝕上部則聲嗄蝕下部則咽乾第八十四證傷寒似瘧歌傷寒似瘧三證詳血室陽明及太陽謂婦人熱入血室及陽明太陽證也太陽汗出脈洪大桂枝各半合麻黃仲景云太陽病八九日如瘧狀熱多寒少清便自可宜桂枝麻黃各半湯陽明忽爾還如瘧不嘔清便熱復涼脈若虛浮桂枝穩小承氣脈實相當仲景云病者煩熱汗出即解復如瘧狀日晡所發者屬陽明脈實者當下之脈浮虛者當發其汗下宜承氣湯發汗宜桂枝湯婦人熱入血凝結柴胡加入地黃湯仲景云婦人中風七八日寒熱往來經水適斷血結如瘧狀宜小柴胡主之第八十五證邪中三焦歌寸口陰陽脈俱緊上下二焦皆受病仲景云寸口脈陰陽俱緊者當邪中於上焦濁邪於下焦清邪中上潔為名濁邪中下渾斯應仲景云清邪中上名曰潔濁邪中下名曰渾也陰中於邪必內栗足膝逆冷便溺出又云陰中於邪必內栗也又云濁邪中下陰氣為栗足膝逆冷便溺妄出也陽中於邪項必強發熱頭疼頸攣屈陽中於邪必發熱頭痛項強頸攣腰痛脛酸也皆因霧露氣為傷隨證治之宜審的第八十六證多眠歌多眠四證病形殊風溫狐惑及柴胡更有少陰同共四當觀形與證何如風溫身熱常自汗仲景云風溫脈陰陽俱浮自汗身重多眠鼻息必鼾小柴脅滿項強拘仲景云陽明中風脈弦浮大而短氣腹都滿脅下及心痛其人嗜臥一身及目悉黃小便難有潮熱宜小柴胡湯少陰自利但欲寐仲景云少陰病但欲寐六經中此一經最難辨難治要在審詳然證辨亦有不寐者仲景云少陰病其人欲吐不吐而煩但欲寐五六日自利而渴者屬少陰仲景不論方又云少陰脈微細沉但欲臥汗出不煩自欲吐五六日自利煩躁不得臥寐者死又云心中煩而不得臥者黃連阿膠湯狐惑多眠非一途仲景云狐惑證默默但欲臥目瞑不得眠瀉心苦參湯主之又玉函一證云三陽合病脈浮大上關上但欲寐目合則汗第八十七證不得眠歌傷寒何事不得眠汗過胃中乾燥煩仲景云太陽病發汗若大汗出胃中干燥煩不得眠其人欲飲水當稍飲之榮衛和則愈矣或因吐下虛煩致仲景云發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之或因大熱語言顛陽毒熱病皆不得眠小便不利正發渴心煩少氣苦孜煎忽若水停心下滿但與豬苓可保全仲景云胃中乾燥不得眠者豬苓湯傷寒瘥後熱尚在陰未復時陽使然病源云衛氣晝行於陽夜行於陰陰主夜夜主臥謂陽氣盡陰氣盛則目瞑矣今熱氣未散與諸陽並所以陽獨盛陰偏虛雖復病後仍不得眠者陰氣未復於本故也外臺有肘後烏梅湯第八十八證小便不利歌胃中干則無小便慎勿利之強使然病源云傷寒發汗後而汗出不止津液少胃中干小腸有伏熱故小便不通也故不可強利之下焦有熱不通泄量病浮沉用藥宣下焦有熱者可宣導之也咳而有水青龍候仲景云傷寒表不解心下有水氣乾嘔發熱而咳或小便不利小腹滿或喘者小青龍湯主之項強無汗桂枝痊仲景云服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿脹痛小便不利者桂枝去桂加茯苓白朮湯大抵中濕發黃者先利小便當使快大抵中濕發黃先利小便使快仲景云中濕之為候其人小便不利大便反快但當利其小便仲景論風濕證云若被下者小便不利又云傷寒身色如金黃如橘子色小便利腹微滿者茵陳蒿湯主之陽明汗多津液無卻以小便利為戒仲景云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓復利其小便也陽若湊之陰分去聲虛小便難出熱中居素問云陰虛者陽必湊之陽入陰分則膀胱熱而小便難漏風不止桂加附仲景云太陽病發汗遂漏風不止惡風小便難四肢急桂枝加附子湯主之陽明風中小柴胡第八十九證小便自利歌太陽下焦有熱祕小腹必滿便不利小便不利反自利此是抵當血證諦大抵熱在下焦小腹必脹滿小便不利今反利者有瘀血也仲景云傷寒有熱而小腹滿應小便不利今反利者此為血證當下之宜抵當丸又云太陽病身黃其脈沉結小腹堅小便不利為無血小便自利其人如狂者血證諦也宜抵當湯陽明自汗小便結忽若利時津液竭屎雖堅硬不可攻蜜兌用之斯要訣仲景云陽明病汗出若發其汗小便自利此為津液內竭屎雖堅不可攻之宜用蜜兌導之使通或土瓜根豬膽汁皆可以導之也又問小便何故數腎與膀胱虛熱作虛則故令小便頻熱則遲澀相擊搏虛中有熱小便故難頻並必遲澀也自汗不可服桂枝仲景云傷寒脈浮自汗出小便數心煩微惡寒腳攣急服桂枝得之便厥作甘草乾薑湯主之趺陽浮澀是脾約仲景云趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便必硬其脾為約麻仁丸主之胃中不和譫語時調胃承氣宜斟酌仲景云傷寒脈浮自汗小便數若胃中不和譫語者少少與調胃承氣湯第九十證大便不利歌大便堅硬或不通柴胡承氣可收功大柴胡湯大小承氣皆要藥也亦有不可攻擊者歌在前篇里證中前篇里證歌有不可下者寒則溏熱則垢可見陰陽虛實候歲火不及大寒行民病騖溏腸胃吼素問云歲火不及寒乃大行民病騖溏者鴨溏也第九十一證大便下利歌傷寒下利多種數要識陰陽勿差互三陽利時身必熱三陰但溫無熱具三陽下利身熱三陰下利但溫而不熱此其大概也合病自利葛根湯或用黃芩無致誤仲景云太陽陽明合病必自利葛根湯主之桂枝證醫反下之利不止者葛根黃芩黃連湯自利不渴屬太陰少陰必渴腎虛故仲景云自利不渴屬太陰其臟有寒故也當溫之宜四逆輩又云自利而渴者屬少陰虛故引水自救也外審證內憑脈內外並觀斯兩得脈大由來卻是虛脈滑而數有宿食脈經云大則為虛仲景云滑而數者有宿食也協熱而利臍下熱仲景云太陽證外證未除而數下之遂協熱而利利下不止心下痞硬表裡未解者桂枝人參湯朱肱云協熱利臍下必熱也譫語而利燥屎結仲景云下利而譫語者為有燥屎也屬承氣湯少陰心痛口燥煩卻與利之斯要訣仲景云少陰病下利清水色青者心下必痛口乾燥者可下之宜大柴胡湯六經中惟少陰病難治有補瀉之法不可不審也第九十二證狐惑證歌蟲食下部名曰狐蟲食上部名曰惑狐則咽乾惑聲嗄傷寒變壞成斯疾面目乍赤乍白黑但欲睡眠昏默默更有𧈟蟲食臟間舌上盡白齒無色仲景云狐惑之病其氣如傷寒默默但欲臥目瞑不得眠起則不安食於喉咽者為惑食於陰者為狐狐惑之病並惡飲食不欲聞食臭其面乍赤乍黑乍白食於上部其聲嗄食於下部其咽乾食上部者瀉心湯主之食下部者苦參湯淹洗之食肛外者燒用雄黃熏之上唇有瘡蝕其臟下唇瘡甚連肛食須頻看上下唇有無瘡有瘡則殺人緊急者也多因下利而得之此證殺人為最急第九十三證百合歌百脈一宗皆病形無復經絡最難明巢氏云傷寒百合病者謂無經絡百脈一宗悉致病也皆因傷寒虛勞大病之後不平復而變成斯病也欲臥又卻不得臥欲行還復不能行飲食有美有不美雖如強健步難勝如有寒復無寒如有熱復無熱口苦小便還赤結藥才入口即吐利如有神靈來作孽病後虛勞多變成百合地黃湯可啜巢氏云其狀意欲食獲不得食常默欲臥復不得臥欲出行而復不能行飲食或有美時或有不美時或如強健人而欲臥復不得臥如有寒復如無寒如有熱復如無熱至朝口苦小便赤黃百合之病諸藥不能療得藥則劇而吐如有神靈所加也身形如和其人脈微軟每尿輒頭痛其病六十日乃愈若尿時不頭痛淅淅然如寒者四十日愈若尿時快然但眩者二十日愈也第九十四證辨傷寒疫氣不同歌春氣溫和夏暑熱秋氣淒涼冬凜冽四時正氣自調均不犯寒邪無病孽冬時寒凜欲周密君子深藏宜入室中而即病曰傷寒觸冒寒邪成此疾毒氣若深不即病至春與夏邪方出春為溫病夏為暑變態無端證非一以上論傷寒也仲景云春為溫和夏為暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子周密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為最者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病熱極重於溫也是以辛苦之人春夏多溫熱病者皆由冬時觸冒所致非時行之氣若乃時行自不同蓋是不時之氣失春時應暖反大寒夏時應熱卻寒栗秋氣清涼大熱來冬氣寒時似春日少長一般病相似此是時行號溫疫欲知正氣與天行要在潛心占鬥歷以上論行時疫氣仲景云凡時行者春時應暖而反大寒夏時應熱而反大涼秋氣應涼而大熱冬時應寒而反大溫此非時有其氣是一歲之中長幼之病相似者此時行之氣也夫欲候知四時正氣為病及時行疫氣之法者當按鬥歷占之第九十五證婦人傷寒歌婦人此疾當區別身重身輕不同列産前身重且安胎産後血虛先補血産前安胎産後補血此大法也水火相刑浸自傷榮衛不和多阻節平居水常養於木水木相資血通徹傷寒男子先調氣婦人先調血血室不蓄則一氣諧和血室凝結水火相刑五行相剋以生相扶以出平居之日水常養於木水木相生則榮養血室血室不蓄則脾無蘊積無蘊積則剛燥不生左關浮緊汗為宜正恐室中成血結婦人左關浮緊不可下當發其汗以救血室榮衛得和津液自通浹然汗出而解也血室不蓄脾無蘊剛燥不生免邪熱血蓄則剛燥生仲景所謂無犯胃氣及上二焦者也産後多生三種病大便堅祕難通泄鬱冒仍兼自汗多皆是血虛津液竭婦人産後有三種病大便祕鬱冒自汗皆是血虛所致也血虛而厥厥必冒冒家解時汗流浹津液既少大便難孤陽上出恐陰絶三病皆血少陰虛孤陽獨行所致也當補陰抑陽唯有柴胡四物湯庶可調和使安悅第九十六證婦人熱入血室歌婦人中風七八日身熱續續發寒栗經水適來或適斷熱隨陰血居其室晝則明瞭暮譫語狀如見鬼如痁疾無犯胃氣及二焦小柴胡證尤為的更刺期門以瀉肝邪去自然保安吉切須急療莫遲遲變證來時恐無及仲景云婦人中風發熱惡寒經水適來得之七八日熱除後遍身涼胸膈苦滿如結胸狀譫語者此為熱入血室也當刺期門穴隨其虛實而取之又云婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之又云婦人傷寒發狂經水適來晝則明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦自愈第九十七證傷寒瘥後病歌傷寒瘥後還喜唾胸裡有寒實無那此候唯宜服理中胃暖病治痰自破仲景云大病已後其人喜唾久久不了胸上有寒當溫之宜理中丸主之勞復枳實梔子湯發熱小柴胡亦可仲景云大病已後勞復枳實梔子湯主之又云傷寒瘥後發熱小柴胡湯主之腰下水氣牡蠣散仲景云大病已後腰下有水氣者宜用牡蠣散主之也日暮微煩脾不磨要須損谷自然安甘節吉兮必無禍仲景云病人脈已解日暮微煩者以病新瘥強與谷食不消也損谷則愈周易節卦九五甘節吉往有尚象曰甘節之吉居位中也第九十八證傷寒五臟死絶歌水漿不下汗如油形體不仁喘不休此為命絶終難治更看何臟絶中求汗出發潤為肺絶唇吻反青肝絶憂脾絶口黑並黃色腎絶便失與遺溲心絶身似煙薰黑更兼直視與搖頭五臟皆絶無可療縱逢和緩亦難瘳仲景云脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也又未知何臟先受其災若汗出發潤喘而不休者此肺先絶也陽反獨留形體如煙薰直視搖頭此心絶也唇吻反青四肢漐習者此肝先絶也環口黧黑柔汗發黃此脾絶也溲便遺失狂言反目直視此為腎絶也第九十九證傷寒死脈歌傷寒死脈定難痊陽病見陰端可憐仲景云陽病見陰脈者死上氣脈散為形損耳聾浮澀命難全仲景云傷寒咳逆上氣其脈散者死謂其形損故也扁鵲云病若耳聾脈反浮大而澀者死也譫言身熱宜洪大沉細而微壽不延腹大泄利當微細緊大而滑歸下泉吐衄若得沉細吉浮大而牢嘆逝川扁鵲云病若譫言妄語身當有熱脈當洪大而反手足厥逆脈沉細而微者而死病若大腹泄脈當微細而澀反得緊大而滑者死病若吐血復鼽衄血者脈當沉細而反浮大而牢者死也陰陽俱虛熱不止乍疏乍數命歸天仲景云陰陽俱虛熱不止者死脈至乍數乍疏者死如屋漏如雀啄來如彈石去解索經云脈如屋漏如雀啄者死脈來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復以緒者也蝦遊魚翔脈證乖轉豆偃刀形候惡經云病人脈如蝦之遊如魚之翔者死脈如轉豆者死如偃刀者死下不至關陽氣絶上不至關陰氣鑠經云寸脈下不至關為陽絶尺脈上不至關為陰絶皆死不治代脈來時不用醫必定傾危難救藥仲景云代陰也得此脈者必難治也第一百證傷寒死候歌傷寒死候要須知泄而腹滿大難醫舌本爛傷熱不已千金云傷寒死候有九證二曰泄而腹滿甚者死六曰舌本爛傷熱不已者死汗後脈躁亦傾危太素云熱病已得汗而脈尚躁此陰極之脈也死千金云傷寒已得汗脈靜者生躁者死汗出雖多不至足千金云汗出不至足者死手循衣縫更何為華他云病人手循衣縫者不可活卵縮舌卷證候惡華陀云卵縮舌卷者必死口張目陷不多時華他云口如魚口不閉目眶陷者皆死赤斑五死一生在黑斑十死更何疑凡發斑者熱乘虛入胃胃爛故也赤斑出五死一生黑斑出十死一生兩感傷寒最大忌死期六日命難追仲景云熱雖甚不死若兩感於寒而病者必死
